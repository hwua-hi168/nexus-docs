<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="UTF-8">
    <title>Hi168 帮助文档</title>
    <link rel="stylesheet" href="vue.css" />
    <style>
        /* 隐藏侧边栏中的"数据集及模型" */
        .sidebar-nav a[href*="dataset-model"] {
            display: none;
        }

        /* 确保页面有白色背景，嵌入 iframe 时也可见 */
        html, body {
            background-color: #fff !important;
        }

        /* 模态框样式 */
        #modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
        }

        #modal.active {
            display: flex;
        }

        #modalImg {
            max-width: 90%;
            max-height: 90%;
            transition: transform 0.2s;
            cursor: grab;
        }

        #modalImg.grabbing {
            cursor: grabbing;
        }

        #closeBtn {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 移除控制按钮 */
        /*
        .controls {
            position: absolute;
            top: 50%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            transform: translateY(-50%);
        }
        .controls button {
            background: rgba(255,255,255,0.5);
            border: none;
            padding: 10px;
            cursor: pointer;
            font-size: 24px;
        }
        */

          /* 添加折叠样式 */
        .sidebar-nav ul li {
            list-style: none;
            position: relative;
            cursor: pointer;
        }

        .sidebar-nav ul li ul {
            display: none; /* 默认折叠子菜单 */
            padding-left: 15px;
        }

        .collapse-btn {
            display: inline-block;
            margin-right: 6px;
            font-size: 10px;
            transition: transform 0.2s;
            cursor: pointer;
            padding: 4px 8px;
        }

        /* 展开时旋转箭头 */
        .collapse-btn[data-collapsed="false"] {
            transform: rotate(90deg);
        }
    </style>
</head>

<body>
  
    <div id="app">加载中......</div>

    <!-- 模态框结构 -->
    <div id="modal">
        <span id="closeBtn">&times;</span>
        <img id="modalImg" src="" alt="放大图片">
    </div>

    <script>
        function removeHashFromEnd(str) {
            if (str.endsWith('#/')) {
                return str.slice(0, -2);
            } else {
                return str;
            }
        }

        // 获取并处理 URL 查询参数
        console.log(`window.location.href[${window.location.href}]`)
        let link1 = 'docs/README.md';
        if(window.location.href.includes("?")){
            let link = removeHashFromEnd(window.location.href.split('?')[1]);
            if (link !== 'undefined' && link !== 'abcShop') {
                if (link === 'abcImage') {
                    link = 'abcimage'
                }
                // 尝试匹配 docs/ 或 manual/ 路径，兼容旧的 01/ 路径
                if (link.startsWith('docs/') || link.startsWith('manual/')) {
                    link1 = link + '.md';
                } else {
                    link1 = 'manual/01/' + link + '.md';
                }
            }
        }

        // 配置 docsify 选项
        window.$docsify = {
            basePath: './',
            themeColor: '#990066',
            el: '#app',
            homepage: link1,
            notFoundPage: true,
            loadNavbar: '_navbar.md',
            loadSidebar: '_sidebar.md',
            alias: {
                '/.*/_navbar.md': '/_navbar.md',
            },
            subMaxLevel: 4,
            repo: '',
            subMaxLevel: 4, // 设置侧边栏嵌套层级
            plugins: [
            function(hook) {
                // 记录用户手动折叠/展开的状态，key 为分类文字
                var manualState = {};
                var initialized = false;

                hook.doneEach(function() {
                var currentPath = (window.location.hash || '#/').replace('#', '');

                var nodes = document.querySelectorAll('.sidebar-nav > ul > li');
                nodes.forEach(function(node) {
                    var subUl = node.querySelector('ul');
                    if (!subUl) return;

                    // 用分类标题文字作为 key
                    var strong = node.querySelector('strong') || node.querySelector('p');
                    var key = strong ? strong.textContent.trim() : node.textContent.trim().substring(0, 20);

                    // 清除可能残留的旧箭头
                    node.querySelectorAll('.collapse-btn').forEach(function(el) { el.remove(); });

                    // 添加箭头
                    var span = document.createElement('span');
                    span.className = 'collapse-btn';
                    span.innerHTML = '▶';
                    node.insertBefore(span, node.firstChild);

                    // 判断当前页面是否属于这个分类
                    var hasActivePage = false;
                    subUl.querySelectorAll('a').forEach(function(a) {
                    var href = (a.getAttribute('href') || '').replace('#/', '/').replace('./', '/');
                    if (currentPath.length > 1 && currentPath.indexOf(href) > -1) {
                        hasActivePage = true;
                    }
                    });

                    // 决定展开/折叠
                    var shouldOpen;
                    if (key in manualState) {
                    // 用户手动操作过，尊重用户选择
                    shouldOpen = manualState[key];
                    } else if (hasActivePage) {
                    // 当前页面在此分类下，自动展开
                    shouldOpen = true;
                    } else {
                    // 默认折叠
                    shouldOpen = false;
                    }

                    subUl.style.display = shouldOpen ? 'block' : 'none';
                    span.style.transform = shouldOpen ? 'rotate(90deg)' : 'rotate(0deg)';

                    // 点击箭头切换
                    span.addEventListener('click', function(e) {
                    e.stopPropagation();
                    e.preventDefault();
                    var isHidden = subUl.style.display === 'none';
                    subUl.style.display = isHidden ? 'block' : 'none';
                    span.style.transform = isHidden ? 'rotate(90deg)' : 'rotate(0deg)';
                    manualState[key] = isHidden; // 记录用户操作
                    });

                    // 点击分类标题切换
                    if (strong) {
                    strong.style.cursor = 'pointer';
                    strong.addEventListener('click', function(e) {
                        e.stopPropagation();
                        e.preventDefault();
                        var isHidden = subUl.style.display === 'none';
                        subUl.style.display = isHidden ? 'block' : 'none';
                        span.style.transform = isHidden ? 'rotate(90deg)' : 'rotate(0deg)';
                        manualState[key] = isHidden;
                    });
                    }

                    // 点击子链接时，标记该分类为展开（防止导航后被折叠）
                    subUl.querySelectorAll('a').forEach(function(a) {
                    a.addEventListener('click', function() {
                        manualState[key] = true;
                    });
                    });
                });
                });
            }
            ]

        }

        // 初始化模态框功能
        let initialize = () => {
            const images = document.querySelectorAll('img');
            const modal = document.getElementById('modal');
            const modalImg = document.getElementById('modalImg');
            const closeBtn = document.getElementById('closeBtn');

            let scale = 1;
            let isDragging = false;
            let startX, startY, initialMouseX, initialMouseY;
            let translateX = 0, translateY = 0;

            // 打开模态框并设置图片源
            function openModal(src) {
                modal.style.display = 'flex';
                modalImg.src = src;
                scale = 1;
                translateX = 0;
                translateY = 0;
                modalImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
                modal.classList.add('active');
                modalImg.style.cursor = 'grab';
            }

            // 关闭模态框
            function closeModal() {
                modal.style.display = 'none';
                modal.classList.remove('active');
                modalImg.style.cursor = 'grab';
            }

            // 鼠标滚轮缩放
            modalImg.onwheel = function (e) {
                e.preventDefault(); // 阻止默认滚动行为
                const delta = Math.sign(e.deltaY);
                const zoomFactor = delta > 0 ? 0.9 : 1.1;
                scale *= zoomFactor;
                if (scale < 0.1) scale = 0.1;
                if (scale > 5) scale = 5;
                updateScale();
            }

            // 鼠标按下开始拖动
            modalImg.onmousedown = function (e) {
                isDragging = true;
                startX = e.clientX - translateX;
                startY = e.clientY - translateY;
                modalImg.style.cursor = 'grabbing';
                // 阻止默认行为，防止选中文本或打开新页面
                e.preventDefault();
            }

            window.onmousemove = function (e) {
                if (!isDragging) return;
                translateX = e.clientX - startX;
                translateY = e.clientY - startY;
                updateScale();
            }

            window.onmouseup = function () {
                if (isDragging) {
                    isDragging = false;
                    modalImg.style.cursor = 'grab';
                }
            }

            // 触摸设备拖动支持（可选）
            modalImg.ontouchstart = function (e) {
                if (e.touches.length === 1) {
                    isDragging = true;
                    const touch = e.touches[0];
                    startX = touch.clientX - translateX;
                    startY = touch.clientY - translateY;
                    modalImg.style.cursor = 'grabbing';
                    e.preventDefault();
                }
            }

            window.ontouchmove = function (e) {
                if (!isDragging || e.touches.length !== 1) return;
                const touch = e.touches[0];
                translateX = touch.clientX - startX;
                translateY = touch.clientY - startY;
                updateScale();
            }

            window.ontouchend = function () {
                if (isDragging) {
                    isDragging = false;
                    modalImg.style.cursor = 'grab';
                }
            }

            // 更新缩放和位移
            function updateScale() {
                modalImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
            }

            // 点击图片打开模态框
            images.forEach(img => {
                img.addEventListener('click', function (e) {
                    e.preventDefault(); // 阻止默认行为，如在新标签页中打开链接
                    openModal(img.src);
                });
            });

            // 关闭模态框事件
            closeBtn.onclick = closeModal;

            // 点击模态框外部区域关闭
            window.onclick = function (event) {
                if (event.target == modal) {
                    closeModal();
                }
            }
        };

        // 延迟1秒后执行
        setTimeout(() => {
            initialize();

            // 创建一个 MutationObserver 实例并传入回调函数
            const observer = new MutationObserver(mutationsList => {
                mutationsList.forEach(mutation => {
                    if (mutation.type === 'attributes' && mutation.attributeName === 'style') {
                        // 重新获取图片并添加事件
                        initialize();
                        // 如果不再需要监听，可以断开观察
                        // observer.disconnect();
                    }
                });
            });

            // 配置观察选项
            const config = { attributes: true, attributeFilter: ['style'] };

            // 获取所有具有 class "progress" 的元素
            const progressElements = document.querySelectorAll('.progress');

            if (progressElements.length > 0) {
                progressElements.forEach(element => {
                    observer.observe(element, config);
                });
            } else {
                console.error('未找到具有类名 "progress" 的元素');
            }
        }, 1000); // 1秒后执行
    </script>
    <script src="docsify.min.js"></script>
  
</body>

</html>
